name: Auto Update Channels

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run auto-updater
        run: node scripts/auto-updater.js

      - name: Commit and push changes
        run: |
          git config user.name "Auto Updater"
          git config user.email "auto-updater@iptv.local"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update dead channel URLs [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi
