name: Auto-Update Channels

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest channels from source repos
        shell: pwsh
        run: |
          ./scripts/fetch-channels.ps1

      - name: Commit and push changes
        shell: pwsh
        run: |
          git config user.name "Auto Update Bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          $diff = git diff --cached --stat
          if ($diff) {
            git commit -m "Auto-update channels from source repos"
            git push
            Write-Host "✅ Changes pushed"
          } else {
            Write-Host "ℹ️ No changes to commit"
          }
